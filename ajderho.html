<canvas id="dragonCanvas" style="position: fixed; top: 0; left: 0; pointer-events: none; z-index: 10000;"></canvas>

<script>
    const canvas = document.getElementById('dragonCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
    let dragon = [];
    const numSegments = 40; 
    const segmentDist = 10;
    
    // Yulduzli chang uchun massiv
    let particles = [];

    for (let i = 0; i < numSegments; i++) {
        dragon.push({ 
            x: mouse.x, 
            y: mouse.y, 
            angle: 0, 
            size: i === 0 ? 18 : 15 - (i * 0.35) 
        });
    }

    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        
        // Harakatlanganda yulduzchalar yaratish
        if (Math.random() > 0.5) {
            particles.push({
                x: mouse.x,
                y: mouse.y,
                size: Math.random() * 3,
                color: `hsla(${200 + Math.random() * 60}, 100%, 70%, 0.8)`,
                vX: (Math.random() - 0.5) * 2,
                vY: (Math.random() - 0.5) * 2,
                life: 1
            });
        }
    });

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    function drawDragon() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Yulduzli changni chizish (Go'zallik uchun)
        particles.forEach((p, index) => {
            p.x += p.vX;
            p.y += p.vY;
            p.life -= 0.02;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            if (p.life <= 0) particles.splice(index, 1);
        });
        ctx.globalAlpha = 1;

        // 2. Ajdaho harakati
        dragon[0].x += (mouse.x - dragon[0].x) * 0.12;
        dragon[0].y += (mouse.y - dragon[0].y) * 0.12;

        for (let i = 1; i < numSegments; i++) {
            const dx = dragon[i-1].x - dragon[i].x;
            const dy = dragon[i-1].y - dragon[i].y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const angle = Math.atan2(dy, dx);
            dragon[i].angle = angle;

            if (distance > segmentDist) {
                dragon[i].x = dragon[i-1].x - Math.cos(angle) * segmentDist;
                dragon[i].y = dragon[i-1].y - Math.sin(angle) * segmentDist;
            }

            // Tana qismlarini chizish (Elegant Aura)
            ctx.save();
            ctx.translate(dragon[i].x, dragon[i].y);
            ctx.rotate(dragon[i].angle);
            
            // Go'zal ranglar: Binafsha, Havorang va Kumush
            const hue = 220 + (i * 2); 
            const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, dragon[i].size);
            grad.addColorStop(0, `hsla(${hue}, 100%, 80%, 1)`); 
            grad.addColorStop(1, `hsla(${hue + 40}, 100%, 30%, 0.2)`); 
            
            ctx.fillStyle = grad;
            ctx.shadowBlur = 15;
            ctx.shadowColor = `hsla(${hue}, 100%, 50%, 0.5)`;

            // Elegant shakl (Yumshoq romblar)
            ctx.beginPath();
            ctx.moveTo(-dragon[i].size, 0);
            ctx.lineTo(0, -dragon[i].size * 0.8);
            ctx.lineTo(dragon[i].size, 0);
            ctx.lineTo(0, dragon[i].size * 0.8);
            ctx.closePath();
            ctx.fill();
            
            // Ajdaho qanotchalari/finlari (Nafislik uchun)
            if (i > 5 && i < 15 && i % 2 === 0) {
                ctx.strokeStyle = `hsla(${hue}, 100%, 70%, 0.3)`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(-20, -30, -40, -10);
                ctx.stroke();
            }
            
            ctx.restore();
        }

        // 3. Bosh qismi (Nafis ko'zlar)
        ctx.save();
        ctx.translate(dragon[0].x, dragon[0].y);
        ctx.rotate(Math.atan2(mouse.y - dragon[0].y, mouse.x - dragon[0].x));
        
        // Sehrli ko'zlar
        ctx.shadowBlur = 10;
        ctx.shadowColor = "white";
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(8, -6, 2.5, 0, Math.PI * 2);
        ctx.arc(8, 6, 2.5, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();

        requestAnimationFrame(drawDragon);
    }

    drawDragon();
</script>
